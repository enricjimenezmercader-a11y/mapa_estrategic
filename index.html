<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mapa Estratègic — Retícula Hexagonal</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      background:#000;
      color:#fff;
      font-family:Arial,Helvetica,sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding-top:20px;
      gap:20px;
    }

    /* Títol i barra d’accions */
    #titleBar{
      font-size:28px;
      font-weight:bold;
      color:white;
      text-align:center;
    }

    #actionBar{
      width:66%;
      height:20px;
      background:#333;
      border:1px solid #666;
      margin-top:-10px;
      margin-bottom:10px;
      position:relative;
    }

    #actionFill{
      height:100%;
      background:#00cc00;
      width:0%;
      transition:width 0.3s ease;
    }

    /* Mapa */
    .map-container{
      position:relative;
      background:#1a1a1a;
      border:1px solid #333;
      overflow:hidden;
    }

    .map-image{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      z-index:1;
      pointer-events:none;
    }

    svg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:10;
    }

    .hex{
      stroke:#000;
      stroke-width:2;
      cursor:pointer;
    }

    .hex-red{ fill:rgba(255,0,0,0.33); }
    .hex-blue{ fill:rgba(0,120,255,0.33); }
    .hex-mar{ fill:rgba(120,120,120,0.33); }

    .hex-hatch{
      fill: url(#hatch-red);
    }

    .hex-label{
      fill:#fff;
      font-weight:bold;
      text-anchor:middle;
      pointer-events:none;
      stroke:#000;
      stroke-width:0.8;
    }

    /* Ordres */
    #orders{
      width:66%;
      color:#7CFF7C;
      font-family:monospace;
      font-size:18px;
      white-space:pre-line;
      min-height:40px;
    }

    .order-line{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:6px;
    }

    .order-btn{
      background:#550000;
      color:#fff;
      border:1px solid #aa0000;
      padding:3px 8px;
      cursor:pointer;
      font-size:14px;
    }

    #confirmBtn{
      margin-top:10px;
      padding:6px 12px;
      background:#004400;
      color:#aaffaa;
      border:1px solid #66ff66;
      cursor:pointer;
      font-size:16px;
      display:block;
    }

    /* Avisos */
    #warning, #warningActions{
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      font-size:40px;
      font-weight:bold;
      color:#FF4444;
      text-shadow:0 0 10px #000;
      opacity:0;
      pointer-events:none;
      z-index:999;
    }

    .blink{
      animation: blinkAnim 0.3s linear infinite;
    }

    @keyframes blinkAnim{
      0%{opacity:1;}
      50%{opacity:0;}
      100%{opacity:1;}
    }
  </style>
</head>

<body>

<div id="titleBar">Equip vermell — Accions disponibles: ...</div>
<div id="actionBar"><div id="actionFill"></div></div>

<div class="map-container" id="mapContainer">
  <div id="warning">Ordre repetida</div>
  <div id="warningActions">Accions insuficients</div>

  <img class="map-image"
       src="https://github.com/enricjimenezmercader-a11y/mapa_estrategic/blob/481d1cc0765b31581a6f050a7f68d53400172e48/map_hex.jpg?raw=true"
       alt="Mapa estratègic">

  <svg id="hexGrid"></svg>
</div>

<div id="orders"></div>
<button id="confirmBtn">Confirmar ordres</button>

<script>
/* CONFIGURACIÓ */
const PATTERN = [5,4,5,4,5,4,5,4,5,4,5];
const CSV_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vS8k769FG5aF_PK-AmHLVdcfc6sgJeeIhWkL9Q8Gcrs39JW9GyJid_OtHcwhN9r3xhFvWPrc_yigZiY/pub?output=csv";

const REAL_R = 41.78;
const REAL_GRID_WIDTH = 17 * REAL_R;
const IMAGE_RATIO = 1.4;

let hexData = [];
let selectedRed = null;
let highlightedAdjacents = [];
let ordersSet = new Set();
let actionsAvailable = 0;

/* Llegeix CSV i extreu colors + accions disponibles */
async function loadCSV(){
  const res = await fetch(CSV_URL);
  const text = await res.text();
  const lines = text.trim().split("\n");

  const colors = {};
  let H2 = 0;

  lines.forEach((line, index) => {
    const cols = line.split(",");

    // 🔥 CORRECCIÓ: H2 és la SEGONA línia del CSV → index === 1
    if(index === 1){
      H2 = parseInt(cols[7]);
    }

    const id = cols[0];
    const color = cols[1];
    if(id) colors[id.trim()] = color.trim().toUpperCase();
  });

  actionsAvailable = H2;
  updateActionDisplay();

  return colors;
}

/* Actualitza títol i barra */
function updateActionDisplay(){
  const spent = usedPoints();
  const remaining = actionsAvailable - spent;

  document.getElementById("titleBar").textContent =
    `Equip vermell — Accions disponibles: ${actionsAvailable} — Gastades: ${spent} — Restants: ${remaining}`;

  const pct = Math.min(100, (spent / actionsAvailable) * 100);
  document.getElementById("actionFill").style.width = pct + "%";
}

/* ESCALAT DEL MAPA */
function resizeMap(){
  const map = document.getElementById("mapContainer");

  const W = window.innerWidth;
  const H = window.innerHeight;

  const maxW = W * (2/3);
  const maxH = H * (2/3);

  let width = maxW;
  let height = width / IMAGE_RATIO;

  if(height > maxH){
    height = maxH;
    width = height * IMAGE_RATIO;
  }

  map.style.width = width + "px";
  map.style.height = height + "px";
}

/* DIBUIXAR LA RETÍCULA */
async function drawHexGrid(){
  const svg = document.getElementById("hexGrid");
  const map = document.getElementById("mapContainer");

  svg.innerHTML = "";
  hexData = [];
  selectedRed = null;
  highlightedAdjacents = [];

  svg.insertAdjacentHTML("afterbegin", `
    <defs>
      <pattern id="hatch-red" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
        <line x1="0" y1="0" x2="0" y2="6" stroke="rgba(255,0,0,0.5)" stroke-width="3"/>
      </pattern>
    </defs>
  `);

  const colors = await loadCSV();

  const B = map.clientWidth;
  const scale = B / REAL_GRID_WIDTH;
  const R = REAL_R * scale;
  const hexH = Math.sqrt(3) * R;

  const maxRows = Math.max(...PATTERN);
  const gridHeight = (maxRows - 1) * hexH + hexH;
  const A = 17 * R;

  const offsetX = (B - A) / 2 + R;
  const offsetY = (map.clientHeight - gridHeight) / 2 + hexH/2;

  let id = 1;

  PATTERN.forEach((rowCount, col) => {
    for(let r = 0; r < rowCount; r++){

      const cx = offsetX + col * 1.5 * R;
      const cy = offsetY + r * hexH + (col % 2 === 0 ? 0 : hexH/2);

      const pts = [];
      for(let i=0;i<6;i++){
        const ang = Math.PI/3 * i;
        pts.push([cx + R * Math.cos(ang), cy + R * Math.sin(ang)].join(","));
      }

      const g = document.createElementNS("http://www.w3.org/2000/svg","g");

      const poly = document.createElementNS("http://www.w3.org/2000/svg","polygon");
      poly.setAttribute("points", pts.join(" "));

      const color = (colors[id] || "").toUpperCase();
      let cls = "hex hex-mar";

      if(color.includes("RED")) cls = "hex hex-red";
      else if(color.includes("BLUE")) cls = "hex hex-blue";
      else if(color.includes("MAR")) cls = "hex hex-mar";

      poly.setAttribute("class", cls);
      poly.dataset.id = id;

      g.appendChild(poly);

      const label = document.createElementNS("http://www.w3.org/2000/svg","text");
      label.setAttribute("x", cx);
      label.setAttribute("y", cy + 4);
      label.setAttribute("class", "hex-label");
      label.textContent = id;
      g.appendChild(label);

      svg.appendChild(g);

      hexData.push({
        id,
        cx,
        cy,
        color,
        element: poly
      });

      id++;
    }
  });
}

/* AFEGIR TRAMA ALS ADJACENTS */
function highlightAdjacent(redHex){
  clearHighlights();
  selectedRed = redHex;

  const R = REAL_R * (document.getElementById("mapContainer").clientWidth / REAL_GRID_WIDTH);
  const maxDist = Math.sqrt(3) * R * 1.01;

  highlightedAdjacents = [];

  hexData.forEach(h => {
    if(h.color === "BLUE"){
      const dx = h.cx - redHex.cx;
      const dy = h.cy - redHex.cy;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if(dist <= maxDist){
        h.element.classList.add("hex-hatch");
        highlightedAdjacents.push(h);
      }
    }
  });
}

/* TREURE TRAMES */
function clearHighlights(){
  highlightedAdjacents.forEach(h => h.element.classList.remove("hex-hatch"));
  highlightedAdjacents = [];
  selectedRed = null;
}

/* AVÍS D’ORDRE REPETIDA */
function showWarning(){
  const w = document.getElementById("warning");
  w.classList.add("blink");
  w.style.opacity = 1;

  setTimeout(()=>{
    w.style.opacity = 0;
    w.classList.remove("blink");
  }, 2000);
}

/* AVÍS D’ACCIONS INSUFICIENTS */
function showWarningActions(){
  const w = document.getElementById("warningActions");
  w.classList.add("blink");
  w.style.opacity = 1;

  setTimeout(()=>{
    w.style.opacity = 0;
    w.classList.remove("blink");
  }, 2000);
}

/* CALCULAR PUNTS UTILITZATS */
function usedPoints(){
  return ordersSet.size * 10;
}

/* AFEGIR ORDRE D’ATAC */
function addOrder(origin, target){
  const key = `${origin}-${target}`;

  if(ordersSet.has(key)){
    showWarning();
    return;
  }

  if(usedPoints() + 10 > actionsAvailable - 10){
    showWarningActions();
    return;
  }

  ordersSet.add(key);

  const orders = document.getElementById("orders");

  const line = document.createElement("div");
  line.className = "order-line";
  line.dataset.key = key;

  const text = document.createElement("span");
  text.textContent = `Ordre d'atac, territori ${origin} a territori ${target}`;

  const btn = document.createElement("button");
  btn.textContent = "Suspendre ordre";
  btn.className = "order-btn";

  btn.onclick = () => {
    ordersSet.delete(key);
    line.remove();
    updateActionDisplay();
  };

  line.appendChild(text);
  line.appendChild(btn);
  orders.appendChild(line);

  updateActionDisplay();
}

/* CLICK HANDLER */
function setupClickHandler(){
  const svg = document.getElementById("hexGrid");

  svg.addEventListener("click", e => {
    const poly = e.target.closest("polygon");

    if(!poly){
      clearHighlights();
      return;
    }

    const id = parseInt(poly.dataset.id);
    const hex = hexData.find(h => h.id === id);

    if(hex.color === "RED"){
      highlightAdjacent(hex);
      return;
    }

    if(selectedRed && highlightedAdjacents.some(h => h.id === id)){
      addOrder(selectedRed.id, hex.id);
      return;
    }

    clearHighlights();
  });
}

/* REDIBUIXAR TOT */
function redraw(){
  resizeMap();
  drawHexGrid().then(()=>{
    setupClickHandler();
    updateActionDisplay();
  });
}

window.addEventListener("resize", redraw);
redraw();
</script>

</body>
</html>
