<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Estratègic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 100%;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .map-container {
            width: 66.67%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
            position: relative;
            border: 1px solid #333;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
            pointer-events: none;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 10;
        }

        .hex {
            transition: opacity 0.2s;
        }

        .hex-red {
            fill: rgba(255, 0, 0, 0.6);
            stroke: rgba(255, 0, 0, 1);
            stroke-width: 1.5;
        }

        .hex-blue {
            fill: rgba(0, 120, 255, 0.6);
            stroke: rgba(0, 120, 255, 1);
            stroke-width: 1.5;
        }

        .hex-mar {
            fill: rgba(100, 100, 100, 0.4);
            stroke: rgba(100, 100, 100, 0.6);
            stroke-width: 1;
        }

        .hex-label {
            fill: white;
            font-size: 10px;
            font-weight: bold;
            text-anchor: middle;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

<div class="map-container" id="mapContainer">
    <iframe src="https://drive.google.com/file/d/1pBPverbNZjYP8yOcZ6hpAkVL1UURvmr0/preview"></iframe>
    <svg id="hexGrid"></svg>
</div>

<script>
    const HEX_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQuN-CAKFbHJeAyZ2soqthTSRFOP41B_yQNRRM28IjzZf-HqIpf-azR4hYOQV4KzDWeY0zAe8LVCQrj/pub?output=csv';
    const PATTERN = [5, 4, 5, 4, 5, 4, 5, 4, 5, 4, 5];
    
    let hexData = {};

    /**
     * Fetch with timeout
     */
    async function fetchWithTimeout(url, timeout = 8000) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeout);
        
        try {
            const res = await fetch(url, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res;
        } catch (e) {
            clearTimeout(timeoutId);
            throw e;
        }
    }

    /**
     * Initialize map
     */
    async function init() {
        try {
            // Load hex color definitions
            const res = await fetchWithTimeout(HEX_CSV + '&t=' + new Date().getTime());
            const text = await res.text();
            const colors = {};
            
            text.split('\n').forEach(line => {
                const cols = line.split(',');
                if (cols.length >= 2) {
                    colors[cols[0].trim()] = cols[1].trim().toUpperCase();
                }
            });

            // Build hex data
            let count = 1;
            PATTERN.forEach((rowCount, colIdx) => {
                for (let r = 0; r < rowCount; r++) {
                    const id = count.toString();
                    const typeVal = colors[id] || "";
                    
                    let hexType = "RED";
                    if (typeVal.includes("MAR")) hexType = "MAR";
                    else if (typeVal === "BLUE") hexType = "BLUE";
                    
                    hexData[id] = {
                        c: colIdx,
                        r: r,
                        type: hexType
                    };
                    count++;
                }
            });

            draw();
            window.addEventListener('resize', draw);

        } catch (e) {
            console.error('Error loading map:', e);
            document.getElementById('mapContainer').innerHTML = `<p style="color:#ff4444;">Error loading map: ${e.message}</p>`;
        }
    }

    /**
     * Calculate corner points of a hexagon
     */
    function getHexCorners(x, y, radius) {
        const corners = [];
        for (let i = 0; i < 6; i++) {
            const angle = (Math.PI / 3) * i;
            corners.push({
                x: x + radius * Math.cos(angle),
                y: y + radius * Math.sin(angle)
            });
        }
        return corners;
    }

    /**
     * Draw hexagon grid perfectly fitted to map
     * Corner A (hex 1 top-left) fits to corner B (map top-left)
     * Corner C (hex 50 bottom-right) fits to corner D (map bottom-right)
     */
    function draw() {
        const svg = document.getElementById('hexGrid');
        const container = document.getElementById('mapContainer');
        
        svg.innerHTML = '';

        const containerW = container.clientWidth;
        const containerH = container.clientHeight;

        // Pointy-top hex geometry
        const hexHeight = Math.sqrt(3); // height in terms of radius

        // Calculate radius based on container dimensions
        // We need to fit the grid to the exact container size
        // The grid extends from column 0 to 10 (11 columns)
        // Row pattern: 5,4,5,4,5,4,5,4,5,4,5
        
        // Width calculation: (maxCol - minCol + 1) * 1.5 * radius - 0.5 * radius
        // = 10 * 1.5 * radius - 0.5 * radius = 14.5 * radius
        // Actually: 11 columns, so spacing is from col 0 to col 10 = 10 intervals of 1.5*radius
        // Plus the radius on each end = 10 * 1.5 * radius + radius = 16 * radius? 
        // Let's recalculate: if we have cols 0-10, the width between first and last hex center is 10 * 1.5 = 15 radii
        // Plus half a radius on each side = 15.5 * radius, but we want corner to corner
        // A pointy-top hex spans 2*radius horizontally at widest
        // So total: 15 * radius + 2 * radius = 17 * radius? Let's be precise...

        // For pointy-top hexagon:
        // - Horizontal distance between adjacent hex centers = 1.5 * radius
        // - Vertical distance between adjacent hex centers = sqrt(3) * radius (same row) or sqrt(3)/2 * radius (adjacent rows)

        // Max column is 10, so width needed: 10 * 1.5 * radius for spacing, plus radius on each side = 16 * radius
        // But corners: from leftmost point of hex at col 0 to rightmost point of hex at col 10
        // Leftmost point of hex 0: x - radius
        // Rightmost point of hex 10: x + radius
        // So total: (10 * 1.5 * radius + radius) - (-radius) + extra = 10 * 1.5 * radius + 2 * radius = 17 * radius

        // Find max row: row 4 appears multiple times, so max is 4
        // Vertical span: 4 rows * sqrt(3) * radius + sqrt(3) * radius (for top/bottom) = 5 * sqrt(3) * radius
        
        const radiusW = containerW / 17; // 11 cols gives us 10 intervals of 1.5 + 2 for edges
        const radiusH = containerH / (5 * hexHeight);
        const radius = Math.min(radiusW, radiusH);

        // Recalculate to center the grid perfectly
        const gridW = 17 * radius;
        const gridH = 5 * hexHeight * radius;
        
        const startX = (containerW - gridW) / 2 + radius;
        const startY = (containerH - gridH) / 2 + hexHeight * radius;

        // Draw hexagons
        Object.keys(hexData).forEach(id => {
            const hex = hexData[id];
            const { c, r, type } = hex;

            const x = c * 1.5 * radius + startX;
            const y = r * hexHeight * radius + (c % 2 === 0 ? 0 : hexHeight * radius / 2) + startY;

            // Create hexagon points
            const points = Array.from({ length: 6 }, (_, i) => {
                const angle = (Math.PI / 3) * i;
                const px = x + radius * Math.cos(angle);
                const py = y + radius * Math.sin(angle);
                return `${px},${py}`;
            }).join(' ');

            // Create group
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

            // Create polygon
            const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            poly.setAttribute('points', points);
            poly.setAttribute('class', `hex hex-${type.toLowerCase()}`);
            poly.setAttribute('id', 'hex-' + id);

            // Create label
            const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            label.setAttribute('x', x);
            label.setAttribute('y', y + 3);
            label.setAttribute('class', 'hex-label');
            label.textContent = id;

            g.appendChild(poly);
            g.appendChild(label);
            svg.appendChild(g);
        });
    }

    // Start
    init();
</script>

</body>
</html>
