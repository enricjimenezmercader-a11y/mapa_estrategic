<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mapa Estratègic</title>
  <style>
    :root{
      --bg:#000;
      --panel:#1a1a1a;
      --panel-border:#333;
      --label-color:#fff;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      min-height:100vh;
      background:var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--label-color);
    }

    .outer-container{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .map-container{
      position:relative;
      background:var(--panel);
      border:1px solid var(--panel-border);
      display:flex;
      align-items:center;
      justify-content:center;
      max-width:calc(100vw - 40px);
      max-height:calc(100vh - 40px);
      overflow:hidden;
    }

    /* iframe sits under the SVG */
    iframe{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      z-index:1;
      transition:box-shadow .15s ease;
    }

    /* control to enable iframe interaction */
    .iframe-toggle{
      position:absolute;
      right:10px;
      top:10px;
      z-index:30;
      background:rgba(0,0,0,0.6);
      color:#fff;
      border:1px solid rgba(255,255,255,0.08);
      padding:6px 8px;
      font-size:13px;
      cursor:pointer;
      border-radius:4px;
      backdrop-filter:blur(4px);
    }

    svg{
      position:relative;
      z-index:10;
      width:100%;
      height:100%;
      display:block;
      background:transparent;
    }

    .hex{ transition:opacity .18s ease, transform .12s ease; }
    .hex-red{ fill:rgba(255,0,0,.6); stroke:rgba(255,0,0,1); stroke-width:1.2; }
    .hex-blue{ fill:rgba(0,120,255,.6); stroke:rgba(0,120,255,1); stroke-width:1.2; }
    .hex-mar{ fill:rgba(100,100,100,.4); stroke:rgba(100,100,100,.6); stroke-width:1; }

    .hex-label{
      fill:var(--label-color);
      font-weight:700;
      text-anchor:middle;
      pointer-events:none;
      paint-order:stroke;
      stroke:rgba(0,0,0,0.6);
      stroke-width:1;
    }

    /* overlay error message */
    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:40;
      pointer-events:none;
    }
    .overlay .msg{
      background:rgba(0,0,0,0.7);
      color:#ffdddd;
      padding:12px 16px;
      border-radius:6px;
      pointer-events:auto;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="outer-container">
    <div class="map-container" id="mapContainer" aria-live="polite">
      <iframe id="previewFrame" src="https://drive.google.com/file/d/1pBPverbNZjYP8yOcZ6hpAkVL1UURvmr0/preview" title="Preview document"></iframe>
      <button class="iframe-toggle" id="toggleIframe" aria-pressed="false">Enable preview interaction</button>
      <svg id="hexGrid" role="img" aria-label="Mapa estratègic en forma de graella hexagonal">
        <title>Mapa estratègic</title>
      </svg>
      <div class="overlay" id="overlay" hidden>
        <div class="msg" id="overlayMsg"></div>
      </div>
    </div>
  </div>

  <script>
    const HEX_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQuN-CAKFbHJeAyZ2soqthTSRFOP41B_yQNRRM28IjzZf-HqIpf-azR4hYOQV4KzDWeY0zAe8LVCQrj/pub?output=csv';
    const PATTERN = [5,4,5,4,5,4,5,4,5,4,5];

    let hexData = {};
    let colors = {};
    const svg = document.getElementById('hexGrid');
    const mapContainer = document.getElementById('mapContainer');
    const overlay = document.getElementById('overlay');
    const overlayMsg = document.getElementById('overlayMsg');
    const iframe = document.getElementById('previewFrame');
    const toggleBtn = document.getElementById('toggleIframe');

    // Debounce helper
    function debounce(fn, wait=120){
      let t;
      return (...args)=>{ clearTimeout(t); t = setTimeout(()=>fn(...args), wait); };
    }

    async function fetchWithTimeout(url, timeout = 8000){
      const controller = new AbortController();
      const id = setTimeout(()=>controller.abort(), timeout);
      try{
        const res = await fetch(url, { signal: controller.signal });
        clearTimeout(id);
        if(!res.ok) throw new Error('HTTP ' + res.status);
        return res;
      } catch(e){
        clearTimeout(id);
        throw e;
      }
    }

    // Robust CSV parse for simple two-column mapping id,color
    function parseCsv(text){
      const rows = text.split(/\r?\n/).map(r => r.trim()).filter(r => r.length);
      const out = {};
      for(const row of rows){
        // split on first comma to allow commas in second column if any
        const idx = row.indexOf(',');
        if(idx === -1) continue;
        const a = row.slice(0, idx).trim().replace(/^"|"$/g,'');
        const b = row.slice(idx+1).trim().replace(/^"|"$/g,'');
        if(a) out[a] = b.toUpperCase();
      }
      return out;
    }

    async function init(){
      try{
        overlay.hidden = true;
        const res = await fetchWithTimeout(HEX_CSV + '&t=' + Date.now(), 9000);
        const text = await res.text();
        colors = parseCsv(text);
      } catch(e){
        // show non-destructive overlay message
        overlayMsg.textContent = 'No s’han pogut carregar els colors del mapa. S’utilitzaran valors per defecte.';
        overlay.hidden = false;
        colors = {}; // fallback to defaults
        console.warn('CSV load failed', e);
      }

      buildHexData();
      draw();
      window.addEventListener('resize', debounce(draw, 120));
    }

    function buildHexData(){
      hexData = {};
      let count = 1;
      PATTERN.forEach((rowCount, colIdx) => {
        for(let r=0; r<rowCount; r++){
          const id = String(count);
          const typeVal = (colors[id] || '').toUpperCase();
          let hexType = 'RED';
          if(typeVal.includes('MAR')) hexType = 'MAR';
          else if(typeVal === 'BLUE') hexType = 'BLUE';
          hexData[id] = { c: colIdx, r: r, type: hexType };
          count++;
        }
      });
    }

    function draw(){
      // compute container available size
      const maxW = Math.max(200, Math.min(window.innerWidth - 40, 1400));
      const maxH = Math.max(200, Math.min(window.innerHeight - 40, 1000));

      // derive grid geometry from pattern
      const cols = PATTERN.length;
      const maxRows = Math.max(...PATTERN);

      // We need to find the largest hexRadius such that the whole grid fits inside maxW x maxH
      // center-to-center horizontal span = (cols - 1) * 1.5 * r + 2*r (left/right radius)
      // center-to-center vertical span = (maxRows - 1) * (sqrt(3)*r) + sqrt(3)*r (top/bottom margins)
      // but offset columns add half hexHeight for odd columns; we account by adding hexHeight/2 margin top/bottom

      // Solve for r from width constraint:
      // width = (cols - 1) * 1.5 * r + 2*r = r * (1.5*(cols-1) + 2)
      // height = (maxRows - 1) * hexH + hexH + hexH/2 = hexH * (maxRows + 0.5)
      // where hexH = sqrt(3) * r

      const widthFactor = 1.5 * (cols - 1) + 2;
      const rFromWidth = maxW / widthFactor;
      const rFromHeight = maxH / (Math.sqrt(3) * (maxRows + 0.5));
      const hexRadius = Math.floor(Math.min(rFromWidth, rFromHeight, 120)); // cap radius for readability

      const hexH = Math.sqrt(3) * hexRadius;

      // compute final grid pixel dimensions
      const totalGridWidth = Math.ceil(widthFactor * hexRadius);
      const totalGridHeight = Math.ceil(Math.sqrt(3) * hexRadius * (maxRows + 0.5));

      // set container size
      mapContainer.style.width = totalGridWidth + 'px';
      mapContainer.style.height = totalGridHeight + 'px';

      // set svg attributes
      svg.setAttribute('width', totalGridWidth);
      svg.setAttribute('height', totalGridHeight);
      svg.setAttribute('viewBox', `0 0 ${totalGridWidth} ${totalGridHeight}`);

      // clear
      while(svg.firstChild) svg.removeChild(svg.firstChild);

      // add title element for accessibility (keeps existing <title> if present)
      const title = document.createElementNS('http://www.w3.org/2000/svg','title');
      title.textContent = 'Mapa estratègic';
      svg.appendChild(title);

      // starting offsets so hexes don't get clipped
      const startX = hexRadius;
      const startY = hexH / 2;

      // draw hexes
      Object.keys(hexData).forEach(id => {
        const { c, r, type } = hexData[id];
        const x = c * 1.5 * hexRadius + startX;
        const y = r * hexH + (c % 2 === 0 ? 0 : hexH / 2) + startY;

        // polygon points
        const pts = [];
        for(let i=0;i<6;i++){
          const angle = Math.PI / 3 * i;
          const px = x + hexRadius * Math.cos(angle);
          const py = y + hexRadius * Math.sin(angle);
          pts.push(`${px},${py}`);
        }

        const g = document.createElementNS('http://www.w3.org/2000/svg','g');
        const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
        poly.setAttribute('points', pts.join(' '));
        poly.setAttribute('class', `hex hex-${type.toLowerCase()}`);
        poly.setAttribute('id', 'hex-' + id);
        poly.setAttribute('data-id', id);
        poly.setAttribute('role','presentation');

        // label
        const label = document.createElementNS('http://www.w3.org/2000/svg','text');
        label.setAttribute('x', x);
        // vertical offset scales with radius so it looks centered
        label.setAttribute('y', y + Math.max(2, Math.round(hexRadius * 0.12)));
        label.setAttribute('class', 'hex-label');
        label.setAttribute('font-size', Math.max(10, Math.round(hexRadius * 0.28)));
        label.setAttribute('aria-hidden','true');
        label.textContent = id;

        g.appendChild(poly);
        g.appendChild(label);
        svg.appendChild(g);
      });
    }

    // toggle iframe pointer events so user can interact when needed
    toggleBtn.addEventListener('click', ()=>{
      const enabled = iframe.style.pointerEvents !== 'auto';
      iframe.style.pointerEvents = enabled ? 'auto' : 'none';
      iframe.style.boxShadow = enabled ? '0 6px 18px rgba(0,0,0,0.6)' : 'none';
      toggleBtn.textContent = enabled ? 'Disable preview interaction' : 'Enable preview interaction';
      toggleBtn.setAttribute('aria-pressed', String(enabled));
    });

    // initial state: iframe not interactive
    iframe.style.pointerEvents = 'none';

    // start
    init();
  </script>
</body>
</html>
