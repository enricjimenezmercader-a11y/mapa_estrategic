<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa amb 50 hexàgons numerats</title>

<style>
    body {
        margin: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #container {
        position: relative;
        width: 90vw;
        height: 90vh;
    }

    #mapa {
        width: 100%;
        height: 100%;
        object-fit: contain;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
    }

    svg {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 2;
        width: 100%;
        height: 100%;
        pointer-events: none;
    }

    .hex {
        fill: rgba(255,255,255,0.05);
        stroke: rgba(255,255,255,0.2);
        stroke-width: 1;
        cursor: pointer;
        pointer-events: all;
        transition: 0.2s;
    }

    .hex.selected {
        fill: rgba(255,255,0,0.4);
        stroke: yellow;
        stroke-width: 2;
    }

    .hex-label {
        fill: white;
        font-size: 18px;
        font-family: sans-serif;
        text-anchor: middle;
        dominant-baseline: middle;
        pointer-events: none;
    }
</style>
</head>
<body>

<div id="container">
    <img id="mapa" src="https://raw.githubusercontent.com/enricjimenezmercader-a11y/mapa_estrategic/8d00183e27e13a1a7c79dd4a130d632dc29c8310/map.jpg" alt="Mapa">
    <svg id="hexgrid"></svg>
</div>

<script>
const svg = document.getElementById("hexgrid");

// radi de l'hexàgon
const radius = 60;

// 10 columnes, alternant 6 i 4
const numCols = 10;
const rowsEvenCol = 6; // columnes parells
const rowsOddCol  = 4; // columnes senars

function hexPoints(cx, cy, r) {
    const pts = [];
    for (let i = 0; i < 6; i++) {
        const angle = Math.PI / 3 * i + Math.PI / 6;
        pts.push((cx + r * Math.cos(angle)) + "," + (cy + r * Math.sin(angle)));
    }
    return pts.join(" ");
}

function generateFixedGrid() {
    const width  = svg.clientWidth;
    const height = svg.clientHeight;

    const hexHeight = Math.sqrt(3) * radius;
    const hexWidth  = radius * 2;

    const colSpacing = hexWidth * 0.75;
    const rowSpacing = hexHeight;

    const totalWidth  = (numCols - 1) * colSpacing + hexWidth;
    const maxRows     = rowsEvenCol;
    const totalHeight = (maxRows - 1) * rowSpacing + hexHeight;

    const offsetX = (width  - totalWidth)  / 2;
    const offsetY = (height - totalHeight) / 2;

    let number = 1;

    for (let col = 0; col < numCols; col++) {
        const isEvenCol = (col % 2 === 0);
        const numRows   = isEvenCol ? rowsEvenCol : rowsOddCol;

        for (let row = 0; row < numRows; row++) {
            if (number > 50) return;

            const cx = offsetX + col * colSpacing + hexWidth / 2;

            const verticalOffset = isEvenCol ? 0 : hexHeight;
            const cy = offsetY + row * rowSpacing + hexHeight / 2 + verticalOffset;

            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

            const hex = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            hex.setAttribute("points", hexPoints(cx, cy, radius));
            hex.setAttribute("class", "hex");

            const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
            label.setAttribute("x", cx);
            label.setAttribute("y", cy);
            label.setAttribute("class", "hex-label");
            label.textContent = number;

            g.appendChild(hex);
            g.appendChild(label);

            g.addEventListener("click", () => {
                hex.classList.toggle("selected");
            });

            svg.appendChild(g);

            number++;
        }
    }
}

generateFixedGrid();
</script>

</body>
</html>
