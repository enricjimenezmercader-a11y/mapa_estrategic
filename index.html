<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mapa Estratègic — Retícula Hexagonal</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      background:#000;
      color:#fff;
      font-family:Arial,Helvetica,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    /* PRIMER PAS: Amplada del mapa = 2/3 de la pantalla */
    .map-container{
      position:relative;
      width:66.666vw;
      aspect-ratio: 1.4;
      background:#1a1a1a;
      border:1px solid #333;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    iframe{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      z-index:1;
      pointer-events:none;
    }

    svg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:10;
    }

    .hex-red{ fill:rgba(255,0,0,.6); stroke:rgba(255,0,0,1); }
    .hex-blue{ fill:rgba(0,120,255,.6); stroke:rgba(0,120,255,1); }
    .hex-mar{ fill:rgba(100,100,100,.4); stroke:rgba(100,100,100,.7); }

    .hex-label{
      fill:#fff;
      font-weight:bold;
      text-anchor:middle;
      pointer-events:none;
      stroke:#000;
      stroke-width:0.8;
    }
  </style>
</head>

<body>

<div class="map-container" id="mapContainer">
  <iframe src="https://drive.google.com/file/d/1pBPverbNZjYP8yOcZ6hpAkVL1UURvmr0/preview"></iframe>
  <svg id="hexGrid"></svg>
</div>

<script>
/* CONFIG */
const PATTERN = [5,4,5,4,5,4,5,4,5,4,5];  // 11 columnes
const GRID_RATIO = 0.95;                 // A = 0.95 * B

/* Funció principal */
function drawHexGrid(){
  const svg = document.getElementById("hexGrid");
  const map = document.getElementById("mapContainer");

  svg.innerHTML = "";

  /* PRIMER PAS: amplada del mapa (ja és 2/3 via CSS) */
  const B = map.clientWidth;

  /* SEGON PAS: amplada objectiu de la retícula */
  const A = B * GRID_RATIO;

  /* Càlcul del radi perquè la retícula tingui amplada A */
  const cols = PATTERN.length;
  const R = A / (1.5 * (cols - 1) + 2);  // fórmula exacta
  const hexH = Math.sqrt(3) * R;

  /* Alçada total de la retícula */
  const maxRows = Math.max(...PATTERN);
  const gridHeight = (maxRows - 1) * hexH + hexH;

  /* Centrat perfecte */
  const offsetX = (B - A) / 2 + R;
  const offsetY = (map.clientHeight - gridHeight) / 2 + hexH/2;

  /* Dibuixar hexàgons */
  let id = 1;

  PATTERN.forEach((rowCount, col) => {
    for(let r = 0; r < rowCount; r++){
      const cx = offsetX + col * 1.5 * R;
      const cy = offsetY + r * hexH + (col % 2 === 0 ? 0 : hexH/2);

      const pts = [];
      for(let i=0;i<6;i++){
        const ang = Math.PI/3 * i;
        pts.push([
          cx + R * Math.cos(ang),
          cy + R * Math.sin(ang)
        ].join(","));
      }

      const g = document.createElementNS("http://www.w3.org/2000/svg","g");

      const poly = document.createElementNS("http://www.w3.org/2000/svg","polygon");
      poly.setAttribute("points", pts.join(" "));
      poly.setAttribute("class", "hex-red");
      g.appendChild(poly);

      const label = document.createElementNS("http://www.w3.org/2000/svg","text");
      label.setAttribute("x", cx);
      label.setAttribute("y", cy + 4);
      label.setAttribute("class", "hex-label");
      label.textContent = id++;
      g.appendChild(label);

      svg.appendChild(g);
    }
  });
}

/* Redibuixar quan canvia la mida */
window.addEventListener("resize", drawHexGrid);

/* Inicialitzar */
drawHexGrid();
</script>

</body>
</html>
