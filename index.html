<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mapa Estratègic</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{display:flex;align-items:center;justify-content:center;background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif}
    .outer-container{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:0}
    .map-container{position:relative;background:#1a1a1a;border:1px solid #333;overflow:hidden}
    iframe{position:absolute;inset:0;width:100%;height:100%;border:0;z-index:1;pointer-events:none}
    svg{position:relative;display:block;z-index:10}
    .iframe-toggle{position:absolute;right:10px;top:10px;z-index:30;background:rgba(0,0,0,0.6);color:#fff;border:1px solid rgba(255,255,255,0.08);padding:6px 8px;font-size:13px;cursor:pointer;border-radius:4px}
    .hex{transition:opacity .18s ease, transform .12s ease}
    .hex-red{fill:rgba(255,0,0,.6);stroke:rgba(255,0,0,1);stroke-width:1.2}
    .hex-blue{fill:rgba(0,120,255,.6);stroke:rgba(0,120,255,1);stroke-width:1.2}
    .hex-mar{fill:rgba(100,100,100,.4);stroke:rgba(100,100,100,.6);stroke-width:1}
    .hex-label{fill:#fff;font-weight:700;text-anchor:middle;pointer-events:none;stroke:rgba(0,0,0,0.6);stroke-width:1}
    .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:40;pointer-events:none}
    .overlay .msg{background:rgba(0,0,0,0.7);color:#ffdddd;padding:12px 16px;border-radius:6px;pointer-events:auto;font-size:14px}
  </style>
</head>
<body>
  <div class="outer-container">
    <div class="map-container" id="mapContainer" aria-live="polite">
      <iframe id="previewFrame" src="https://drive.google.com/file/d/1pBPverbNZjYP8yOcZ6hpAkVL1UURvmr0/preview" title="Preview document"></iframe>
      <button class="iframe-toggle" id="toggleIframe" aria-pressed="false">Enable preview interaction</button>
      <svg id="hexGrid" role="img" aria-label="Mapa estratègic en forma de graella hexagonal">
        <title>Mapa estratègic</title>
      </svg>
      <div class="overlay" id="overlay" hidden><div class="msg" id="overlayMsg"></div></div>
    </div>
  </div>

    const PATTERN = [5,4,5,4,5,4,5,4,5,4,5];
