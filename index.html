<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mapa Estratègic — Retícula Hexagonal</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      background:#000;
      color:#fff;
      font-family:Arial,Helvetica,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* El contenidor NO té mida fixa: la mida es calcula via JS */
    .map-container{
      position:relative;
      background:#1a1a1a;
      border:1px solid #333;
      overflow:hidden;
    }

    .map-image{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain; /* IMPORTANT: no es talla mai */
      z-index:1;
      pointer-events:none;
    }

    svg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:10;
      pointer-events:none;
    }

    .hex-outline{
      fill:none;
      stroke:#000;
      stroke-width:2;
    }
  </style>
</head>

<body>

<div class="map-container" id="mapContainer">
  <img class="map-image"
       src="https://github.com/enricjimenezmercader-a11y/mapa_estrategic/blob/481d1cc0765b31581a6f050a7f68d53400172e48/map_hex.jpg?raw=true"
       alt="Mapa estratègic">
  <svg id="hexGrid"></svg>
</div>

<script>
/* CONFIG */
const PATTERN = [5,4,5,4,5,4,5,4,5,4,5];  // 11 columnes

/* MESURES REALS DE LA RETÍCULA IMPRESA */
const REAL_R = 41.78;                     // radi real mesurat
const REAL_GRID_WIDTH = 17 * REAL_R;      // amplada real de la retícula
const IMAGE_RATIO = 1.4;                  // proporció de la imatge (ample/alt)

/* ESCALAT DEL MAPA SEGONS LA REGLA DELS 2/3 */
function resizeMap(){
  const map = document.getElementById("mapContainer");

  const W = window.innerWidth;
  const H = window.innerHeight;

  /* límits segons la regla dels 2/3 */
  const maxW = W * (2/3);
  const maxH = H * (2/3);

  /* escalar mantenint proporció */
  let width = maxW;
  let height = width / IMAGE_RATIO;

  if(height > maxH){
    height = maxH;
    width = height * IMAGE_RATIO;
  }

  map.style.width = width + "px";
  map.style.height = height + "px";
}

/* DIBUIXAR LA RETÍCULA */
function drawHexGrid(){
  const svg = document.getElementById("hexGrid");
  const map = document.getElementById("mapContainer");

  svg.innerHTML = "";

  const B = map.clientWidth;

  /* Escala necessària perquè la retícula coincideixi amb la imatge */
  const scale = B / REAL_GRID_WIDTH;
  const R = REAL_R * scale;

  const hexH = Math.sqrt(3) * R;

  const maxRows = Math.max(...PATTERN);
  const gridHeight = (maxRows - 1) * hexH + hexH;

  const A = 17 * R;

  const offsetX = (B - A) / 2 + R;
  const offsetY = (map.clientHeight - gridHeight) / 2 + hexH/2;

  PATTERN.forEach((rowCount, col) => {
    for(let r = 0; r < rowCount; r++){
      const cx = offsetX + col * 1.5 * R;
      const cy = offsetY + r * hexH + (col % 2 === 0 ? 0 : hexH/2);

      const pts = [];
      for(let i=0;i<6;i++){
        const ang = Math.PI/3 * i;
        pts.push([
          cx + R * Math.cos(ang),
          cy + R * Math.sin(ang)
        ].join(","));
      }

      const poly = document.createElementNS("http://www.w3.org/2000/svg","polygon");
      poly.setAttribute("points", pts.join(" "));
      poly.setAttribute("class", "hex-outline");

      svg.appendChild(poly);
    }
  });
}

/* REDIBUIXAR TOT */
function redraw(){
  resizeMap();
  drawHexGrid();
}

window.addEventListener("resize", redraw);
redraw();
</script>

</body>
</html>
