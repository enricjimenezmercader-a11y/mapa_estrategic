<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mapa Estratègic — Retícula Hexagonal</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      background:#000;
      color:#fff;
      font-family:Arial,Helvetica,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .map-container{
      position:relative;
      background:#1a1a1a;
      border:1px solid #333;
      overflow:hidden;
      width:66.666vw;   /* PRIMER PAS: 2/3 de la pantalla */
      height:auto;
      aspect-ratio: 1.4; /* proporció estable perquè l’iframe no es deformi */
      display:flex;
      align-items:center;
      justify-content:center;
    }

    iframe{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      z-index:1;
      pointer-events:none;
    }

    svg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:10;
      overflow:visible;
    }

    .hex-red{ fill:rgba(255,0,0,.6); stroke:rgba(255,0,0,1); }
    .hex-blue{ fill:rgba(0,120,255,.6); stroke:rgba(0,120,255,1); }
    .hex-mar{ fill:rgba(100,100,100,.4); stroke:rgba(100,100,100,.7); }

    .hex-label{
      fill:#fff;
      font-weight:bold;
      text-anchor:middle;
      pointer-events:none;
      stroke:#000;
      stroke-width:0.8;
    }
  </style>
</head>

<body>

<div class="map-container" id="mapContainer">
  <iframe src="https://drive.google.com/file/d/1pBPverbNZjYP8yOcZ6hpAkVL1UURvmr0/preview"></iframe>
  <svg id="hexGrid"></svg>
</div>

<script>
/* CONFIG */
const PATTERN = [5,4,5,4,5,4,5,4,5,4,5];  // 11 columnes
const GRID_WIDTH_RATIO = 0.95;           // SEGON PAS: 95% de l’amplada del mapa

/* Construcció de la retícula */
function drawHexGrid(){
  const svg = document.getElementById("hexGrid");
  const map = document.getElementById("mapContainer");

  svg.innerHTML = "";

  /* 1. Amplada del mapa (ja és 2/3 de la pantalla via CSS) */
  const mapWidth = map.clientWidth;

  /* 2. Amplada objectiu de la retícula */
  const targetGridWidth = mapWidth * GRID_WIDTH_RATIO;

  /* 3. Calcular radi de l’hexàgon perquè la retícula tingui aquesta amplada */
  const cols = PATTERN.length;
  const hexRadius = targetGridWidth / ( (cols - 1) * 1.5 + 2 );
  const hexHeight = Math.sqrt(3) * hexRadius;

  /* 4. Calcular alçada total de la retícula */
  const maxRows = Math.max(...PATTERN);
  const gridHeight = (maxRows - 1) * hexHeight + hexHeight;

  /* 5. Centrar la retícula dins del mapa */
  const offsetX = (mapWidth - targetGridWidth) / 2 + hexRadius;
  const offsetY = (map.clientHeight - gridHeight) / 2 + hexHeight/2;

  /* 6. Dibuixar hexàgons */
  let id = 1;

  PATTERN.forEach((rowCount, col) => {
    for(let r = 0; r < rowCount; r++){
      const cx = offsetX + col * 1.5 * hexRadius;
      const cy = offsetY + r * hexHeight + (col % 2 === 0 ? 0 : hexHeight/2);

      const points = [];
      for(let i=0;i<6;i++){
        const angle = Math.PI/3 * i;
        points.push([
          cx + hexRadius * Math.cos(angle),
          cy + hexRadius * Math.sin(angle)
        ].join(","));
      }

      const g = document.createElementNS("http://www.w3.org/2000/svg","g");

      const poly = document.createElementNS("http://www.w3.org/2000/svg","polygon");
      poly.setAttribute("points", points.join(" "));
      poly.setAttribute("class", "hex-red");
      g.appendChild(poly);

      const label = document.createElementNS("http://www.w3.org/2000/svg","text");
      label.setAttribute("x", cx);
      label.setAttribute("y", cy + 4);
      label.setAttribute("class", "hex-label");
      label.textContent = id++;
      g.appendChild(label);

      svg.appendChild(g);
    }
  });
}

/* Redibuixar quan canvia la mida */
window.addEventListener("resize", drawHexGrid);

/* Inicialitzar */
drawHexGrid();
</script>

</body>
</html>
