```html
<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mapa Estratègic — Graella Hexagonal</title>
  <style>
    :root{
      --bg:#000;
      --panel:#1a1a1a;
      --panel-border:#333;
      --label:#fff;
      --control-bg:rgba(0,0,0,0.6);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      min-height:100vh;
      background:var(--bg);
      color:var(--label);
      font-family:Arial,Helvetica,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px;
    }

    .outer{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .map-container{
      position:relative;
      background:var(--panel);
      border:1px solid var(--panel-border);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      max-width:100%;
      max-height:100%;
    }

    iframe{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      z-index:1;
      pointer-events:none;
      transition:box-shadow .12s ease;
    }

    svg{
      position:relative;
      z-index:10;
      display:block;
      width:100%;
      height:100%;
      background:transparent;
    }

    .iframe-toggle{
      position:absolute;
      right:12px;
      top:12px;
      z-index:40;
      background:var(--control-bg);
      color:var(--label);
      border:1px solid rgba(255,255,255,0.08);
      padding:6px 10px;
      font-size:13px;
      cursor:pointer;
      border-radius:6px;
      backdrop-filter:blur(4px);
    }

    .hex{ transition:opacity .18s ease, transform .12s ease; vector-effect:non-scaling-stroke; }
    .hex-red{ fill:rgba(255,0,0,.62); stroke:rgba(255,0,0,1); }
    .hex-blue{ fill:rgba(0,120,255,.62); stroke:rgba(0,120,255,1); }
    .hex-mar{ fill:rgba(100,100,100,.42); stroke:rgba(100,100,100,.7); }

    .hex-label{
      fill:var(--label);
      font-weight:700;
      text-anchor:middle;
      pointer-events:none;
      paint-order:stroke;
      stroke:rgba(0,0,0,0.6);
      stroke-width:1;
    }

    .overlay{
      position:absolute;

      display:flex;

      pointer-events:none;

    .overlay .msg{
      background:rgba(0,0,0,0.7);
      color:#ffdede;
      padding:10px 14px;
      border-radius:8px;
      pointer-events:auto;
      font-size:13px;
    }

    @media (max-width:520px){
      .iframe-toggle{ font-size:12px; padding:6px 8px; right:8px; top:8px; }
    }
  </style>
</head>
<body>
  <div class="outer">
    <div class="map-container" id="mapContainer" aria-live="polite">
      <iframe id="previewFrame" src="https://drive.google.com/file/d/1pBPverbNZjYP8yOcZ6hpAkVL1UURvmr0/preview" title="Preview document"></iframe>
      <button class="iframe-toggle" id="toggleIframe" aria-pressed="false">Enable preview interaction</button>
      <svg id="hexGrid" role="img" aria-label="Mapa estratègic en graella hexagonal">
        <title>Mapa estratègic</title>
      </svg>
      <div class="overlay" id="overlay" hidden><div class="msg" id="overlayMsg"></div></div>
    </div>
  </div>

  <script>
    // CONFIG
    const HEX_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQuN-CAKFbHJeAyZ2soqthTSRFOP41B_yQNRRM28IjzZf-HqIpf-azR4hYOQV4KzDWeY0zAe8LVCQrj/pub?output=csv';
    const PATTERN = [5,4,5,4,5,4,5,4,5,4,5];
    const VIEWPORT_MARGIN = 28; // px margin around the grid
    const BASE_RADIUS = 48; // design radius before scaling
    const MIN_SCALE = 0.55; // prevents microscopic grid
    const MAX_SCALE = 3.5;  // optional upper cap

    // DOM
    const svg = document.getElementById('hexGrid');
    const mapContainer = document.getElementById('mapContainer');
    const overlay = document.getElementById('overlay');
    const overlayMsg = document.getElementById('overlayMsg');
    const iframe = document.getElementById('previewFrame');
    const toggleBtn = document.getElementById('toggleIframe');

    // state
    let hexData = {};
    let colors = {};

    // helpers
    function debounce(fn, wait=120){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), wait); }; }
    async function fetchWithTimeout(url, timeout = 9000){
      const controller = new AbortController();
      const id = setTimeout(()=>controller.abort(), timeout);
      try{
        const res = await fetch(url, { signal: controller.signal });
        clearTimeout(id);
        if(!res.ok) throw new Error('HTTP ' + res.status);
        return res;
      } catch(e){
        clearTimeout(id);
        throw e;
      }
    }

    function parseCsv(text){
      const rows = text.split(/\r?\n/).map(r=>r.trim()).filter(r=>r.length);
      const out = {};
      for(const row of rows){
        const idx = row.indexOf(',');
        if(idx === -1) continue;
        const a = row.slice(0, idx).trim().replace(/^"|"$/g,'');
        const b = row.slice(idx+1).trim().replace(/^"|"$/g,'');
        if(a) out[a] = b.toUpperCase();
      }
      return out;
    }

    function buildHexData(){
      hexData = {};
      let count = 1;
      PATTERN.forEach((rowCount, colIdx) => {
        for(let r=0;r<rowCount;r++){
          const id = String(count);
          const typeVal = (colors[id] || '').toUpperCase();
          let hexType = 'RED';
          if(typeVal.includes('MAR')) hexType = 'MAR';
          else if(typeVal === 'BLUE') hexType = 'BLUE';
          hexData[id] = { c: colIdx, r: r, type: hexType };
          count++;
        }
      });
    }

    // Primary draw function: compute raw points, compute scale to fit viewport minus margins, clamp scale, draw scaled/translated hexes
    function draw(){
      // base geometry (unscaled)
      const hexRadius = BASE_RADIUS;
      const hexH = Math.sqrt(3) * hexRadius;

      // compute raw centers and corner points
      const centers = {};
      const allPoints = [];
      Object.keys(hexData).forEach(id => {
        const { c, r } = hexData[id];
        const cx = c * 1.5 * hexRadius;
        const cy = r * hexH + (c % 2 === 0 ? 0 : hexH / 2);
        centers[id] = { x: cx, y: cy };
        for(let i=0;i<6;i++){
          const angle = Math.PI / 3 * i;
          const px = cx + hexRadius * Math.cos(angle);
          const py = cy + hexRadius * Math.sin(angle);
          allPoints.push({ x: px, y: py });
        }
      });

      if(allPoints.length === 0){
        overlay.hidden = false;
        overlayMsg.textContent = 'No hi ha dades per dibuixar la graella.';
        console.warn('No hex points available');
        return;
      } else {
        overlay.hidden = true;
      }

      // bounding box of raw points
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      allPoints.forEach(p => {
        if(p.x < minX) minX = p.x;
        if(p.y < minY) minY = p.y;
        if(p.x > maxX) maxX = p.x;
        if(p.y > maxY) maxY = p.y;
      });
      const rawW = maxX - minX;
      const rawH = maxY - minY;

      // available viewport area
      const availW = Math.max(120, window.innerWidth - VIEWPORT_MARGIN * 2);
      const availH = Math.max(120, window.innerHeight - VIEWPORT_MARGIN * 2);

      // internal padding so strokes/labels don't touch edges
      const pad = Math.max(8, Math.round(Math.min(availW, availH) * 0.03));

      // compute scale to fit raw grid into available area minus pad
      const scaleX = (availW - pad * 2) / rawW;
      const scaleY = (availH - pad * 2) / rawH;
      let scale = Math.min(scaleX, scaleY);

      // clamp scale to avoid microscopic or absurdly large sizes
      scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale));

      // scaled grid size
      const scaledW = rawW * scale;
      const scaledH = rawH * scale;

      // container size: fit scaled grid but not exceed available viewport
      const containerW = Math.min(availW, Math.ceil(scaledW + pad * 2));
      const containerH = Math.min(availH, Math.ceil(scaledH + pad * 2));
      mapContainer.style.width = containerW + 'px';
      mapContainer.style.height = containerH + 'px';

      // compute offsets to center grid inside container
      const extraX = Math.max(0, containerW - (scaledW + pad * 2));
      const extraY = Math.max(0, containerH - (scaledH + pad * 2));
      const offsetX = pad + extraX / 2;
      const offsetY = pad + extraY / 2;

      // set svg attributes
      svg.setAttribute('width', containerW);
      svg.setAttribute('height', containerH);
      svg.setAttribute('viewBox', `0 0 ${containerW} ${containerH}`);

      // clear svg
      while(svg.firstChild) svg.removeChild(svg.firstChild);

      // accessibility title
      const title = document.createElementNS('http://www.w3.org/2000/svg','title');
      title.textContent = 'Mapa estratègic';
      svg.appendChild(title);

      // draw each hex scaled and translated
      const scaledRadius = hexRadius * scale;
      const strokeWidth = Math.max(1, Math.round(1.2 * Math.max(0.6, scale)));
      Object.keys(hexData).forEach(id => {
        const { type } = hexData[id];
        const raw = centers[id];
        const cx = (raw.x - minX) * scale + offsetX;
        const cy = (raw.y - minY) * scale + offsetY;

        const pts = [];
        for(let i=0;i<6;i++){
          const angle = Math.PI / 3 * i;
          const px = cx + scaledRadius * Math.cos(angle);
          const py = cy + scaledRadius * Math.sin(angle);
          pts.push(`${px},${py}`);
        }

        const g = document.createElementNS('http://www.w3.org/2000/svg','g');
        const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
        poly.setAttribute('points', pts.join(' '));
        poly.setAttribute('class', `hex hex-${type.toLowerCase()}`);
        poly.setAttribute('id', 'hex-' + id);
        poly.setAttribute('data-id', id);
        poly.setAttribute('role','presentation');
        poly.style.strokeWidth = strokeWidth + 'px';

        const label = document.createElementNS('http://www.w3.org/2000/svg','text');
        label.setAttribute('x', cx);
        label.setAttribute('y', cy + Math.max(2, Math.round(scaledRadius * 0.12)));
        label.setAttribute('class', 'hex-label');
        label.setAttribute('font-size', Math.max(8, Math.round(scaledRadius * 0.28)));
        label.setAttribute('aria-hidden','true');
        label.textContent = id;

        g.appendChild(poly);
        g.appendChild(label);
        svg.appendChild(g);
      });

      // debug info in console
      console.info('Hex grid drawn', {
        hexCount: Object.keys(hexData).length,
        rawW, rawH, scale, containerW, containerH
      });
    }

    // CSV load and init
    async function init(){
      overlay.hidden = true;
      try{
        const res = await fetchWithTimeout(HEX_CSV + '&t=' + Date.now(), 9000);
        const text = await res.text();
        colors = parseCsv(text);
      } catch(e){
        console.warn('Failed to load CSV, using defaults', e);
        overlay.hidden = false;
        overlayMsg.textContent = 'No s’han pogut carregar els colors del mapa. S’utilitzen valors per defecte.';
        colors = {};
      }
      buildHexData();
      draw();
      window.addEventListener('resize', debounce(draw, 120));
    }

    // toggle iframe interaction
    toggleBtn.addEventListener('click', ()=>{
      const enabled = iframe.style.pointerEvents !== 'auto';
      iframe.style.pointerEvents = enabled ? 'auto' : 'none';
      iframe.style.boxShadow = enabled ? '0 8px 28px rgba(0,0,0,0.6)' : 'none';
      toggleBtn.textContent = enabled ? 'Disable preview interaction' : 'Enable preview interaction';
      toggleBtn.setAttribute('aria-pressed', String(enabled));
    });

    // initial state: iframe not interactive
    iframe.style.pointerEvents = 'none';

    // start
    init();
  </script>
</body>
</html>
