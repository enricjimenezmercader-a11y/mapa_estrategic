<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Estratègic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 100%;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .outer-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .map-container {
            position: relative;
            background: #1a1a1a;
            border: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
            pointer-events: none;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 10;
        }

        .hex {
            transition: opacity 0.2s;
        }

        .hex-red {
            fill: rgba(255, 0, 0, 0.6);
            stroke: rgba(255, 0, 0, 1);
            stroke-width: 1.5;
        }

        .hex-blue {
            fill: rgba(0, 120, 255, 0.6);
            stroke: rgba(0, 120, 255, 1);
            stroke-width: 1.5;
        }

        .hex-mar {
            fill: rgba(100, 100, 100, 0.4);
            stroke: rgba(100, 100, 100, 0.6);
            stroke-width: 1;
        }

        .hex-label {
            fill: white;
            font-size: 10px;
            font-weight: bold;
            text-anchor: middle;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

<div class="outer-container">
    <div class="map-container" id="mapContainer">
        <iframe src="https://drive.google.com/file/d/1pBPverbNZjYP8yOcZ6hpAkVL1UURvmr0/preview"></iframe>
        <svg id="hexGrid"></svg>
    </div>
</div>

<script>
    const HEX_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQuN-CAKFbHJeAyZ2soqthTSRFOP41B_yQNRRM28IjzZf-HqIpf-azR4hYOQV4KzDWeY0zAe8LVCQrj/pub?output=csv';
    const PATTERN = [5, 4, 5, 4, 5, 4, 5, 4, 5, 4, 5];
    
    let hexData = {};

    /**
     * Fetch with timeout
     */
    async function fetchWithTimeout(url, timeout = 8000) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeout);
        
        try {
            const res = await fetch(url, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res;
        } catch (e) {
            clearTimeout(timeoutId);
            throw e;
        }
    }

    /**
     * Initialize map
     */
    async function init() {
        try {
            // Load hex color definitions
            const res = await fetchWithTimeout(HEX_CSV + '&t=' + new Date().getTime());
            const text = await res.text();
            const colors = {};
            
            text.split('\n').forEach(line => {
                const cols = line.split(',');
                if (cols.length >= 2) {
                    colors[cols[0].trim()] = cols[1].trim().toUpperCase();
                }
            });

            // Build hex data
            let count = 1;
            PATTERN.forEach((rowCount, colIdx) => {
                for (let r = 0; r < rowCount; r++) {
                    const id = count.toString();
                    const typeVal = colors[id] || "";
                    
                    let hexType = "RED";
                    if (typeVal.includes("MAR")) hexType = "MAR";
                    else if (typeVal === "BLUE") hexType = "BLUE";
                    
                    hexData[id] = {
                        c: colIdx,
                        r: r,
                        type: hexType
                    };
                    count++;
                }
            });

            draw();
            window.addEventListener('resize', draw);

        } catch (e) {
            console.error('Error loading map:', e);
            document.getElementById('mapContainer').innerHTML = `<p style="color:#ff4444;">Error loading map: ${e.message}</p>`;
        }
    }

    /**
     * Draw hexagon grid
     * Container size = Grid size (NOT the other way around)
     */
    function draw() {
        const svg = document.getElementById('hexGrid');
        const mapContainer = document.getElementById('mapContainer');
        const outerContainer = document.querySelector('.outer-container');
        
        svg.innerHTML = '';

        // Fixed hex radius - scale based on screen height
        const hexRadius = window.innerHeight / 14;
        const hexHeight = Math.sqrt(3) * hexRadius;

        // Calculate exact grid dimensions
        // 11 columns (0-10): spacing = 10 intervals of 1.5*radius
        // Width = leftmost hex edge to rightmost hex edge
        // Left edge of hex 0: -radius from center
        // Right edge of hex 10: +radius from center
        // So: (10 * 1.5 * hexRadius + hexRadius) - (-hexRadius) = 10 * 1.5 * hexRadius + 2 * hexRadius = 17 * hexRadius
        
        const gridWidth = 17 * hexRadius;
        const gridHeight = 5 * hexHeight;

        // SET CONTAINER TO GRID SIZE
        mapContainer.style.width = gridWidth + 'px';
        mapContainer.style.height = gridHeight + 'px';

        // SVG matches container
        svg.setAttribute('width', gridWidth);
        svg.setAttribute('height', gridHeight);
        svg.setAttribute('viewBox', `0 0 ${gridWidth} ${gridHeight}`);

        const startX = hexRadius;
        const startY = hexHeight;

        // Draw hexagons
        Object.keys(hexData).forEach(id => {
            const hex = hexData[id];
            const { c, r, type } = hex;

            const x = c * 1.5 * hexRadius + startX;
            const y = r * hexHeight + (c % 2 === 0 ? 0 : hexHeight / 2) + startY;

            // Create hexagon points
            const points = Array.from({ length: 6 }, (_, i) => {
                const angle = (Math.PI / 3) * i;
                const px = x + hexRadius * Math.cos(angle);
                const py = y + hexRadius * Math.sin(angle);
                return `${px},${py}`;
            }).join(' ');

            // Create group
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

            // Create polygon
            const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            poly.setAttribute('points', points);
            poly.setAttribute('class', `hex hex-${type.toLowerCase()}`);
            poly.setAttribute('id', 'hex-' + id);

            // Create label
            const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            label.setAttribute('x', x);
            label.setAttribute('y', y + 3);
            label.setAttribute('class', 'hex-label');
            label.textContent = id;

            g.appendChild(poly);
            g.appendChild(label);
            svg.appendChild(g);
        });
    }

    // Start
    init();
</script>

</body>
</html>
