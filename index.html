<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Estratègic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 100%;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .map-container {
            width: 66.67%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
            position: relative;
            border: 1px solid #333;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
            pointer-events: none;
        }

        svg {
            position: relative;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 10;
        }

        .hex {
            transition: opacity 0.2s;
        }

        .hex-red {
            fill: rgba(255, 0, 0, 0.6);
            stroke: rgba(255, 0, 0, 1);
            stroke-width: 1.5;
        }

        .hex-blue {
            fill: rgba(0, 120, 255, 0.6);
            stroke: rgba(0, 120, 255, 1);
            stroke-width: 1.5;
        }

        .hex-mar {
            fill: rgba(100, 100, 100, 0.4);
            stroke: rgba(100, 100, 100, 0.6);
            stroke-width: 1;
        }

        .hex-label {
            fill: white;
            font-size: 10px;
            font-weight: bold;
            text-anchor: middle;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

<div class="map-container" id="mapContainer">
    <iframe src="https://drive.google.com/file/d/1pBPverbNZjYP8yOcZ6hpAkVL1UURvmr0/preview"></iframe>
    <svg id="hexGrid"></svg>
</div>

<script>
    const HEX_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQuN-CAKFbHJeAyZ2soqthTSRFOP41B_yQNRRM28IjzZf-HqIpf-azR4hYOQV4KzDWeY0zAe8LVCQrj/pub?output=csv';
    const PATTERN = [5, 4, 5, 4, 5, 4, 5, 4, 5, 4, 5];
    
    let hexData = {};

    /**
     * Fetch with timeout
     */
    async function fetchWithTimeout(url, timeout = 8000) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeout);
        
        try {
            const res = await fetch(url, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res;
        } catch (e) {
            clearTimeout(timeoutId);
            throw e;
        }
    }

    /**
     * Initialize map
     */
    async function init() {
        try {
            // Load hex color definitions
            const res = await fetchWithTimeout(HEX_CSV + '&t=' + new Date().getTime());
            const text = await res.text();
            const colors = {};
            
            text.split('\n').forEach(line => {
                const cols = line.split(',');
                if (cols.length >= 2) {
                    colors[cols[0].trim()] = cols[1].trim().toUpperCase();
                }
            });

            // Build hex data
            let count = 1;
            PATTERN.forEach((rowCount, colIdx) => {
                for (let r = 0; r < rowCount; r++) {
                    const id = count.toString();
                    const typeVal = colors[id] || "";
                    
                    let hexType = "RED";
                    if (typeVal.includes("MAR")) hexType = "MAR";
                    else if (typeVal === "BLUE") hexType = "BLUE";
                    
                    hexData[id] = {
                        c: colIdx,
                        r: r,
                        type: hexType
                    };
                    count++;
                }
            });

            draw();
            window.addEventListener('resize', draw);

        } catch (e) {
            console.error('Error loading map:', e);
            document.getElementById('mapContainer').innerHTML = `<p style="color:#ff4444;">Error loading map: ${e.message}</p>`;
        }
    }

    /**
     * Draw hexagon grid perfectly fitted to map
     * Hex 1 at top-left corner, Hex 50 at bottom-right corner
     */
    function draw() {
        const svg = document.getElementById('hexGrid');
        const container = document.getElementById('mapContainer');
        
        svg.innerHTML = '';

        const containerW = container.clientWidth;
        const containerH = container.clientHeight;

        // Find bounds of hex grid
        let minCol = Math.min(...Object.values(hexData).map(h => h.c));
        let maxCol = Math.max(...Object.values(hexData).map(h => h.c));
        let minRow = Math.min(...Object.values(hexData).map(h => h.r));
        let maxRow = Math.max(...Object.values(hexData).map(h => h.r));

        // Calculate hex size to fit the entire grid in the container
        // We need to account for pointy-top hex geometry
        const hexWidth = 2; // In terms of radius
        const hexHeight = Math.sqrt(3); // In terms of radius
        
        // Columns have spacing of 1.5 * radius
        const colSpacing = 1.5;
        // Rows have spacing of sqrt(3) * radius (with offset for even/odd cols)
        const rowSpacing = hexHeight;

        // Total width needed: (maxCol - minCol) * 1.5 * r + 2 * r
        // Total height needed: (maxRow - minRow) * sqrt(3) * r + sqrt(3) * r (for offset rows)
        
        const gridWidthInRadii = (maxCol - minCol) * colSpacing + 2;
        const gridHeightInRadii = (maxRow - minRow) * rowSpacing + rowSpacing;

        // Calculate radius that fits perfectly
        const radiusFromWidth = containerW / gridWidthInRadii;
        const radiusFromHeight = containerH / gridHeightInRadii;
        const hexRadius = Math.min(radiusFromWidth, radiusFromHeight);

        const hexH = hexHeight * hexRadius;

        // Calculate starting position (top-left of first hex should be at 0,0 relative to grid)
        // But we want to center the grid, so we offset from the container edges
        const totalGridWidth = gridWidthInRadii * hexRadius;
        const totalGridHeight = gridHeightInRadii * hexRadius;

        const offsetX = (containerW - totalGridWidth) / 2;
        const offsetY = (containerH - totalGridHeight) / 2;

        // SVG dimensions
        svg.setAttribute('width', containerW);
        svg.setAttribute('height', containerH);
        svg.setAttribute('viewBox', `0 0 ${containerW} ${containerH}`);

        // Draw hexagons
        Object.keys(hexData).forEach(id => {
            const hex = hexData[id];
            const { c, r, type } = hex;

            // Position relative to bounds
            const relCol = c - minCol;
            const relRow = r - minRow;

            // Calculate position
            const x = relCol * 1.5 * hexRadius + hexRadius + offsetX;
            const y = relRow * hexH + (c % 2 === 0 ? 0 : hexH / 2) + hexRadius + offsetY;

            // Create hexagon points
            const points = Array.from({ length: 6 }, (_, i) => {
                const angle = (Math.PI / 3) * i;
                const px = x + hexRadius * Math.cos(angle);
                const py = y + hexRadius * Math.sin(angle);
                return `${px},${py}`;
            }).join(' ');

            // Create group
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

            // Create polygon
            const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            poly.setAttribute('points', points);
            poly.setAttribute('class', `hex hex-${type.toLowerCase()}`);
            poly.setAttribute('id', 'hex-' + id);

            // Create label
            const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            label.setAttribute('x', x);
            label.setAttribute('y', y + 3);
            label.setAttribute('class', 'hex-label');
            label.textContent = id;

            g.appendChild(poly);
            g.appendChild(label);
            svg.appendChild(g);
        });
    }

    // Start
    init();
</script>

</body>
</html>
