<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malla hexagonal compacta</title>

<style>
    body {
        margin: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #container {
        position: relative;
        width: 90vw;
        height: 90vh;
    }

    #mapa {
        width: 100%;
        height: 100%;
        object-fit: contain;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
    }

    svg {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 2;
        width: 100%;
        height: 100%;
        pointer-events: none;
    }

    .hex {
        fill: rgba(255,255,255,0.05);
        stroke: rgba(255,255,255,0.3);
        stroke-width: 1;
        cursor: pointer;
        pointer-events: all;
    }

    .hex-label {
        fill: white;
        font-size: 18px;
        font-family: sans-serif;
        text-anchor: middle;
        dominant-baseline: middle;
        pointer-events: none;
    }
</style>
</head>
<body>

<div id="container">
    <img id="mapa" src="https://raw.githubusercontent.com/enricjimenezmercader-a11y/mapa_estrategic/8d00183e27e13a1a7c79dd4a130d632dc29c8310/map.jpg">
    <svg id="hexgrid"></svg>
</div>

<script>
const svg = document.getElementById("hexgrid");

// Radi de l'hexàgon
const r = 60;

// Dimensions geomètriques
const W = 2 * r;
const H = Math.sqrt(3) * r;

// Separació real
const dx = 1.5 * r;
const dy = (Math.sqrt(3) / 2) * r;

// Configuració: 10 columnes alternant 6 i 4
const numCols = 10;
const rowsEven = 6;
const rowsOdd  = 4;

function hexPoints(cx, cy) {
    const pts = [];
    for (let i = 0; i < 6; i++) {
        const angle = Math.PI/3 * i + Math.PI/6;
        pts.push((cx + r * Math.cos(angle)) + "," + (cy + r * Math.sin(angle)));
    }
    return pts.join(" ");
}

function generateGrid() {
    const width  = svg.clientWidth;
    const height = svg.clientHeight;

    // Amplada total
    const totalWidth = (numCols - 1) * dx + W;

    // Alçada màxima (columna de 6)
    const totalHeight = (rowsEven - 1) * dy + H;

    // Centrat
    const offsetX = (width  - totalWidth)  / 2;
    const offsetY = (height - totalHeight) / 2;

    let num = 1;

    for (let col = 0; col < numCols; col++) {
        const isEven = (col % 2 === 0);
        const numRows = isEven ? rowsEven : rowsOdd;

        for (let row = 0; row < numRows; row++) {
            if (num > 50) return;

            // Coordenades del centre
            const cx = offsetX + col * dx + r;
            const cy = offsetY + row * dy + H/2 + (isEven ? 0 : dy/2);

            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

            const hex = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            hex.setAttribute("points", hexPoints(cx, cy));
            hex.setAttribute("class", "hex");

            const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
            label.setAttribute("x", cx);
            label.setAttribute("y", cy);
            label.setAttribute("class", "hex-label");
            label.textContent = num;

            g.appendChild(hex);
            g.appendChild(label);
            svg.appendChild(g);

            num++;
        }
    }
}

generateGrid();
</script>

</body>
</html>
