<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mapa Estratègic — Retícula Hexagonal</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      background:#000;
      color:#fff;
      font-family:Arial,Helvetica,sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .map-container{
      position:relative;
      background:#1a1a1a;
      border:1px solid #333;
      overflow:hidden;
    }

    .map-image{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      z-index:1;
      pointer-events:none;
    }

    svg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:10;
      pointer-events:none;
    }

    .hex{
      stroke:#000;
      stroke-width:2;
    }

    /* Transparència al 33% */
    .hex-red{ fill:rgba(255,0,0,0.33); }
    .hex-blue{ fill:rgba(0,120,255,0.33); }
    .hex-mar{ fill:rgba(120,120,120,0.33); }

    .hex-label{
      fill:#fff;
      font-weight:bold;
      text-anchor:middle;
      pointer-events:none;
      stroke:#000;
      stroke-width:0.8;
    }
  </style>
</head>

<body>

<div class="map-container" id="mapContainer">
  <img class="map-image"
       src="https://github.com/enricjimenezmercader-a11y/mapa_estrategic/blob/481d1cc0765b31581a6f050a7f68d53400172e48/map_hex.jpg?raw=true"
       alt="Mapa estratègic">
  <svg id="hexGrid"></svg>
</div>

<script>
/* CONFIGURACIÓ */
const PATTERN = [5,4,5,4,5,4,5,4,5,4,5];  // 11 columnes
const CSV_URL =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vS8k769FG5aF_PK-AmHLVdcfc6sgJeeIhWkL9Q8Gcrs39JW9GyJid_OtHcwhN9r3xhFvWPrc_yigZiY/pub?output=csv";

/* MESURES REALS DE LA RETÍCULA IMPRESA */
const REAL_R = 41.78;
const REAL_GRID_WIDTH = 17 * REAL_R;
const IMAGE_RATIO = 1.4;

/* Llegeix CSV i retorna {1:"RED", 2:"BLUE", ...} */
async function loadColors(){
  const res = await fetch(CSV_URL);
  const text = await res.text();
  const lines = text.trim().split("\n");

  const colors = {};

  for(const line of lines){
    const [id, color] = line.split(",");
    if(!id) continue;
    colors[id.trim()] = color.trim().toUpperCase();
  }

  return colors;
}

/* ESCALAT DEL MAPA SEGONS LA REGLA DELS 2/3 */
function resizeMap(){
  const map = document.getElementById("mapContainer");

  const W = window.innerWidth;
  const H = window.innerHeight;

  const maxW = W * (2/3);
  const maxH = H * (2/3);

  let width = maxW;
  let height = width / IMAGE_RATIO;

  if(height > maxH){
    height = maxH;
    width = height * IMAGE_RATIO;
  }

  map.style.width = width + "px";
  map.style.height = height + "px";
}

/* DIBUIXAR LA RETÍCULA */
async function drawHexGrid(){
  const svg = document.getElementById("hexGrid");
  const map = document.getElementById("mapContainer");

  svg.innerHTML = "";

  const colors = await loadColors();

  const B = map.clientWidth;

  const scale = B / REAL_GRID_WIDTH;
  const R = REAL_R * scale;

  const hexH = Math.sqrt(3) * R;

  const maxRows = Math.max(...PATTERN);
  const gridHeight = (maxRows - 1) * hexH + hexH;

  const A = 17 * R;

  const offsetX = (B - A) / 2 + R;
  const offsetY = (map.clientHeight - gridHeight) / 2 + hexH/2;

  let id = 1;

  PATTERN.forEach((rowCount, col) => {
    for(let r = 0; r < rowCount; r++){
      const cx = offsetX + col * 1.5 * R;
      const cy = offsetY + r * hexH + (col % 2 === 0 ? 0 : hexH/2);

      const pts = [];
      for(let i=0;i<6;i++){
        const ang = Math.PI/3 * i;
        pts.push([
          cx + R * Math.cos(ang),
          cy + R * Math.sin(ang)
        ].join(","));
      }

      const g = document.createElementNS("http://www.w3.org/2000/svg","g");

      const poly = document.createElementNS("http://www.w3.org/2000/svg","polygon");
      poly.setAttribute("points", pts.join(" "));

      const color = (colors[id] || "").toUpperCase();
      let cls = "hex hex-mar";

      if(color.includes("RED")) cls = "hex hex-red";
      else if(color.includes("BLUE")) cls = "hex hex-blue";
      else if(color.includes("MAR")) cls = "hex hex-mar";

      poly.setAttribute("class", cls);
      g.appendChild(poly);

      const label = document.createElementNS("http://www.w3.org/2000/svg","text");
      label.setAttribute("x", cx);
      label.setAttribute("y", cy + 4);
      label.setAttribute("class", "hex-label");
      label.textContent = id;
      g.appendChild(label);

      svg.appendChild(g);

      id++;
    }
  });
}

/* REDIBUIXAR TOT */
function redraw(){
  resizeMap();
  drawHexGrid();
}

window.addEventListener("resize", redraw);
redraw();
</script>

</body>
</html>
