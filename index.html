<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mapa Estratègic</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{display:flex;align-items:center;justify-content:center;background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif}
    .outer-container{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:20px}
    .map-container{position:relative;background:#1a1a1a;border:1px solid #333;overflow:hidden}
    iframe{position:absolute;inset:0;width:100%;height:100%;border:0;z-index:1;pointer-events:none}
    svg{position:relative;display:block;z-index:10}
    .iframe-toggle{position:absolute;right:10px;top:10px;z-index:30;background:rgba(0,0,0,0.6);color:#fff;border:1px solid rgba(255,255,255,0.08);padding:6px 8px;font-size:13px;cursor:pointer;border-radius:4px}
    .hex{transition:opacity .18s ease, transform .12s ease}
    .hex-red{fill:rgba(255,0,0,.6);stroke:rgba(255,0,0,1);stroke-width:1.2}
    .hex-blue{fill:rgba(0,120,255,.6);stroke:rgba(0,120,255,1);stroke-width:1.2}
    .hex-mar{fill:rgba(100,100,100,.4);stroke:rgba(100,100,100,.6);stroke-width:1}
    .hex-label{fill:#fff;font-weight:700;text-anchor:middle;pointer-events:none;stroke:rgba(0,0,0,0.6);stroke-width:1}
    .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:40;pointer-events:none}
    .overlay .msg{background:rgba(0,0,0,0.7);color:#ffdddd;padding:12px 16px;border-radius:6px;pointer-events:auto;font-size:14px}
  </style>
</head>
<body>
  <div class="outer-container">
    <div class="map-container" id="mapContainer" aria-live="polite">
      <iframe id="previewFrame" src="https://drive.google.com/file/d/1pBPverbNZjYP8yOcZ6hpAkVL1UURvmr0/preview" title="Preview document"></iframe>
      <button class="iframe-toggle" id="toggleIframe" aria-pressed="false">Enable preview interaction</button>
      <svg id="hexGrid" role="img" aria-label="Mapa estratègic en forma de graella hexagonal">
        <title>Mapa estratègic</title>
      </svg>
      <div class="overlay" id="overlay" hidden><div class="msg" id="overlayMsg"></div></div>
    </div>
  </div>

  <script>
    const HEX_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQuN-CAKFbHJeAyZ2soqthTSRFOP41B_yQNRRM28IjzZf-HqIpf-azR4hYOQV4KzDWeY0zAe8LVCQrj/pub?output=csv';
    const PATTERN = [5,4,5,4,5,4,5,4,5,4,5];

    let hexData = {};
    let colors = {};
    const svg = document.getElementById('hexGrid');
    const mapContainer = document.getElementById('mapContainer');
    const overlay = document.getElementById('overlay');
    const overlayMsg = document.getElementById('overlayMsg');
    const iframe = document.getElementById('previewFrame');
    const toggleBtn = document.getElementById('toggleIframe');

    function debounce(fn, wait=120){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), wait); }; }

    async function fetchWithTimeout(url, timeout = 8000){
      const controller = new AbortController();
      const id = setTimeout(()=>controller.abort(), timeout);
      try{ const res = await fetch(url, { signal: controller.signal }); clearTimeout(id); if(!res.ok) throw new Error('HTTP ' + res.status); return res; }
      catch(e){ clearTimeout(id); throw e; }
    }

    function parseCsv(text){
      const rows = text.split(/\r?\n/).map(r=>r.trim()).filter(r=>r.length);
      const out = {};
      for(const row of rows){
        const idx = row.indexOf(',');
        if(idx === -1) continue;
        const a = row.slice(0, idx).trim().replace(/^"|"$/g,'');
        const b = row.slice(idx+1).trim().replace(/^"|"$/g,'');
        if(a) out[a] = b.toUpperCase();
      }
      return out;
    }

    async function init(){
      try{
        overlay.hidden = true;
        const res = await fetchWithTimeout(HEX_CSV + '&t=' + Date.now(), 9000);
        const text = await res.text();
        colors = parseCsv(text);
      } catch(e){
        overlayMsg.textContent = 'No s’han pogut carregar els colors del mapa. S’utilitzaran valors per defecte.';
        overlay.hidden = false;
        colors = {};
        console.warn('CSV load failed', e);
      }
      buildHexData();
      draw();
      window.addEventListener('resize', debounce(draw, 120));
    }

    function buildHexData(){
      hexData = {};
      let count = 1;
      PATTERN.forEach((rowCount, colIdx) => {
        for(let r=0;r<rowCount;r++){
          const id = String(count);
          const typeVal = (colors[id] || '').toUpperCase();
          let hexType = 'RED';
          if(typeVal.includes('MAR')) hexType = 'MAR';
          else if(typeVal === 'BLUE') hexType = 'BLUE';
          hexData[id] = { c: colIdx, r: r, type: hexType };
          count++;
        }
      });
    }

    function draw(){
      // Choose a candidate radius based on viewport but we'll compute exact extents later
      const maxCandidate = Math.min(Math.max(12, Math.floor(window.innerWidth / 60)), 140);
      const hexRadius = Math.min(120, Math.max(10, Math.floor(maxCandidate)));
      const hexH = Math.sqrt(3) * hexRadius;

      // Compute centers and polygon points first, collect bounding box
      const centers = {};
      const allPoints = []; // {x,y,id}
      const startX = 0; // we'll shift later
      const startY = 0;

      Object.keys(hexData).forEach(id => {
        const { c, r } = hexData[id];
        const cx = c * 1.5 * hexRadius + startX;
        const cy = r * hexH + (c % 2 === 0 ? 0 : hexH / 2) + startY;
        centers[id] = { x: cx, y: cy };
        for(let i=0;i<6;i++){
          const angle = Math.PI / 3 * i;
          const px = cx + hexRadius * Math.cos(angle);
          const py = cy + hexRadius * Math.sin(angle);
          allPoints.push({ x: px, y: py, id });
        }
      });

      if(allPoints.length === 0){
        console.warn('No hex points to draw');
        return;
      }

      // bounding box of all polygon points
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      allPoints.forEach(p => {
        if(p.x < minX) minX = p.x;
        if(p.y < minY) minY = p.y;
        if(p.x > maxX) maxX = p.x;
        if(p.y > maxY) maxY = p.y;
      });

      // padding so strokes and labels are not clipped
      const pad = Math.max(8, Math.round(hexRadius * 0.25));

      const width = Math.ceil(maxX - minX + pad * 2);
      const height = Math.ceil(maxY - minY + pad * 2);

      // set container size to match grid extents
      mapContainer.style.width = width + 'px';
      mapContainer.style.height = height + 'px';

      // set svg viewBox and size
      svg.setAttribute('width', width);
      svg.setAttribute('height', height);
      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);

      // clear svg
      while(svg.firstChild) svg.removeChild(svg.firstChild);

      // accessibility title
      const title = document.createElementNS('http://www.w3.org/2000/svg','title');
      title.textContent = 'Mapa estratègic';
      svg.appendChild(title);

      // draw each hex shifted so minX maps to pad
      Object.keys(hexData).forEach(id => {
        const { type } = hexData[id];
        const c = centers[id].x - minX + pad;
        const r = centers[id].y - minY + pad;

        const pts = [];
        for(let i=0;i<6;i++){
          const angle = Math.PI / 3 * i;
          const px = c + hexRadius * Math.cos(angle);
          const py = r + hexRadius * Math.sin(angle);
          pts.push(`${px},${py}`);
        }

        const g = document.createElementNS('http://www.w3.org/2000/svg','g');
        const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
        poly.setAttribute('points', pts.join(' '));
        poly.setAttribute('class', `hex hex-${type.toLowerCase()}`);
        poly.setAttribute('id', 'hex-' + id);
        poly.setAttribute('data-id', id);
        poly.setAttribute('role','presentation');

        const label = document.createElementNS('http://www.w3.org/2000/svg','text');
        label.setAttribute('x', c);
        label.setAttribute('y', r + Math.max(2, Math.round(hexRadius * 0.12)));
        label.setAttribute('class', 'hex-label');
        label.setAttribute('font-size', Math.max(10, Math.round(hexRadius * 0.28)));
        label.setAttribute('aria-hidden','true');
        label.textContent = id;

        g.appendChild(poly);
        g.appendChild(label);
        svg.appendChild(g);
      });
    }

    // toggle iframe pointer events
    toggleBtn.addEventListener('click', ()=>{
      const enabled = iframe.style.pointerEvents !== 'auto';
      iframe.style.pointerEvents = enabled ? 'auto' : 'none';
      iframe.style.boxShadow = enabled ? '0 6px 18px rgba(0,0,0,0.6)' : 'none';
      toggleBtn.textContent = enabled ? 'Disable preview interaction' : 'Enable preview interaction';
      toggleBtn.setAttribute('aria-pressed', String(enabled));
    });

    iframe.style.pointerEvents = 'none';
    init();
  </script>
</body>
</html>
